services:
  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://teyca:teyca@postgres:5432/teyca
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://teyca:teyca@postgres:5432/teyca
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  consumers:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://teyca:teyca@postgres:5432/teyca
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python -m app.workers.run_queue_consumers

  consent-sync:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://teyca:teyca@postgres:5432/teyca
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: /bin/sh -c 'while true; do python -m app.workers.run_consent_sync; sleep 60; done'

  reconcile:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://teyca:teyca@postgres:5432/teyca
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: /bin/sh -c 'while true; do python -m app.workers.run_listmonk_reconcile; sleep 300; done'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: teyca
      POSTGRES_PASSWORD: teyca
      POSTGRES_DB: teyca
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teyca -d teyca"]
      interval: 2s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5
